site_name: Camila Simsiroglu

# En producción (GitHub Pages) debe ser la URL real, ej: https://TU_USUARIO.github.io/my-hub/
site_url: ''

nav:
  - Home: index.md
  - Archive: archive-portfolio/index.md
  - About: About-me.md
  - CV & Contact: cv-contact.md
  - Documentation:
      - Overview: documentation/index.md
      - Blender Content:
          - Getting Started: documentation/Blender Content/Getting-Started.md
          - Modes in Blender: documentation/Blender Content/Modes-in-Blender copy.md
          - Modifiers: documentation/Blender Content/Modifiers.md
      - 3D Example: documentation/threejs-example.md
      - PCB prototyping with desktop CNC:
          - Introduction: documentation/PCB-prototyping-with-desktop-CNC/Introduction.md
          - Electronic Design: documentation/PCB-prototyping-with-desktop-CNC/Electronic Design.md
          - Design for Milling: documentation/PCB-prototyping-with-desktop-CNC/Design-for-Milling.md
          - Milling Workflow: documentation/PCB-prototyping-with-desktop-CNC/Milling-Workflow.md

theme:
  name: material
  custom_dir: overrides
  
  features:
    - navigation.sections

  palette:
    scheme: default
    primary: white
    accent: teal

  font:
    text: DM Sans
    code: JetBrains Mono

  logo: images/Page-style/logo.png
  favicon: images/Page-style/logo.ico

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra_css:
  - css/custom.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js
  - js/3d-viewer.js

plugins:
  - search

extra:
  generator: false

copyright: ""
